<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>title here</title>
    <meta name="description" content="content here" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../src/styles.css" />
    <!-- Marked.js (Markdownパース) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="brand-wrap">
        <p class="brand-sub">University of Toyama</p>
        <h1>MR Project</h1>
      </div>
      <nav class="site-nav" aria-label="Primary Navigation">
        <a href="../../index.html">Home</a>
        <a href="../../about.html">About</a>
        <a href="../../blog.html" aria-current="page">Blog</a>
        <a href="../../contact.html">Contact</a>
      </nav>
    </header>

    <main class="simple-main">
      <p class="crumb"><a class="text-link" href="../../index.html">Home</a> / <a class="text-link" href="../../blog.html">Blog</a> / 記事</p>
      <article class="article-panel">
        <div class="article-meta">
          <span>20XX.XX.XX</span>
          <span>tag here</span>
        </div>
        <h2>title here</h2>
        <img class="article-image" src="../../src/img/noimg.png" alt="article image" />
        <p>content here</p>
        <p><a class="text-link" href="../../blog.html">Back to Blog</a></p>
      </article>
    </main>

    <footer class="site-footer">
      <p>© 2026 Toyama University MR Project</p>
    </footer>

    <!-- Markdown記事読み込みシステム -->
    <script src="../../src/markdown-loader.js"></script>
    <script>
      /**
       * HTMLファイル名からMDファイルを自動判定して読み込む
       * 例: blog-launched-20260424.html → ../md/blog-launched-20260424.md
       */
      document.addEventListener('DOMContentLoaded', async () => {
        const loader = new MarkdownArticleLoader();
        const article = document.querySelector('.article-panel');
        
        // 現在のHTMLファイル名を取得（パラメータなし）
        const currentPage = window.location.pathname.split('/').pop(); // e.g., "blog-launched-20260424.html"
        
        if (currentPage && currentPage !== 'template.html') {
          // .html → .md に変換
          const mdFileName = currentPage.replace('.html', '.md');
          const mdPath = `../md/${mdFileName}`;
          
          try {
            // Markdownファイルを読み込んでテンプレートに適用
            await loader.applyArticleToTemplate(article, mdPath);
            
            // パンくずのタイトルも更新
            const crumb = document.querySelector('.crumb');
            const title = document.querySelector('.article-panel h2');
            if (crumb && title) {
              crumb.innerHTML = `<a class="text-link" href="../../index.html">Home</a> / <a class="text-link" href="../../blog.html">Blog</a> / ${title.textContent}`;
            }
          } catch (error) {
            console.error(`Failed to load article: ${mdPath}`, error);
          }
        }
      });
    </script>
  </body>
</html>
